<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToxicTox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@80,300;80,500;95,400;100,600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
  }

  [hidden] {
    display: none !important;
  }

  :root {
    color-scheme: dark;
    --bg: #050604;
    --panel: rgba(14, 16, 13, 0.74);
    --ink: #ebe8df;
    --muted: #8d9185;
    --faint: #3f443b;
    --line: rgba(235, 232, 223, 0.1);
    --line-strong: rgba(235, 232, 223, 0.18);
    --signal: #b7ff5b;
    --warm: #d7a45c;
    --gap: clamp(10px, 1.15vw, 18px);
    --side: clamp(18px, 4vw, 64px);
  }

  html {
    min-height: 100%;
    background: var(--bg);
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    background:
      linear-gradient(90deg, rgba(183, 255, 91, 0.045) 1px, transparent 1px) 0 0 / 72px 72px,
      linear-gradient(180deg, rgba(235, 232, 223, 0.032) 1px, transparent 1px) 0 0 / 72px 72px,
      radial-gradient(circle at 70% -20%, rgba(215, 164, 92, 0.14), transparent 34rem),
      radial-gradient(circle at 0 60%, rgba(183, 255, 91, 0.075), transparent 30rem),
      var(--bg);
    color: var(--ink);
    font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    opacity: 0.06;
    mix-blend-mode: screen;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.72'/%3E%3C/svg%3E");
    background-size: 220px 220px;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 41;
    pointer-events: none;
    opacity: 0.22;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 5px,
      rgba(0, 0, 0, 0.34) 6px
    );
  }

  ::selection {
    background: var(--signal);
    color: #10120e;
  }

  .shell {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 22px var(--side) 34px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 20px;
    align-items: start;
    padding: 12px 0 16px;
    background: linear-gradient(180deg, rgba(5, 6, 4, 0.96), rgba(5, 6, 4, 0.74) 72%, transparent);
    backdrop-filter: blur(16px);
  }

  .identity {
    min-width: 0;
  }

  .kicker,
  .repo,
  .count,
  .frame-index,
  .loading,
  .empty,
  .lightbox-meta {
    font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .kicker {
    margin-bottom: 7px;
    color: var(--signal);
  }

  h1 {
    max-width: 100%;
    margin: 0;
    font-size: clamp(2.7rem, 7vw, 6.8rem);
    line-height: 0.86;
    font-stretch: 80%;
    font-weight: 600;
    letter-spacing: 0;
  }

  .repo {
    align-self: end;
    justify-self: end;
    display: inline-flex;
    gap: 10px;
    align-items: center;
    min-height: 32px;
    padding-bottom: 5px;
    color: var(--muted);
    text-decoration: none;
  }

  .repo::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 18px rgba(183, 255, 91, 0.75);
  }

  .repo:hover {
    color: var(--ink);
  }

  .deck {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 18px;
    align-items: end;
    margin: 8px 0 18px;
    padding: 14px 0 0;
    border-top: 1px solid var(--line);
  }

  .deck p {
    max-width: 50rem;
    margin: 0;
    color: var(--muted);
    font-size: clamp(0.92rem, 1.3vw, 1.08rem);
    line-height: 1.45;
    letter-spacing: 0;
  }

  .count {
    color: var(--warm);
    white-space: nowrap;
    justify-self: end;
  }

  .loading,
  .empty {
    display: grid;
    min-height: 42vh;
    place-items: center;
    color: var(--muted);
  }

  .loading::before {
    content: "";
    width: 72px;
    height: 1px;
    margin-right: 14px;
    background: linear-gradient(90deg, transparent, var(--signal), transparent);
    animation: scan 1.4s ease-in-out infinite;
  }

  @keyframes scan {
    0%, 100% { transform: scaleX(0.35); opacity: 0.35; }
    50% { transform: scaleX(1); opacity: 1; }
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: var(--gap);
    align-items: stretch;
  }

  .photo {
    position: relative;
    grid-column: span 4;
    min-height: 260px;
    overflow: hidden;
    isolation: isolate;
    background: #0c0d0b;
    border: 1px solid var(--line);
    cursor: zoom-in;
    opacity: 0;
    transform: translateY(16px);
    transition:
      border-color 260ms ease,
      opacity 700ms ease,
      transform 700ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  .photo.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .photo:nth-child(8n + 1),
  .photo:nth-child(8n + 6) {
    grid-column: span 7;
    min-height: clamp(380px, 58vw, 720px);
  }

  .photo:nth-child(8n + 2),
  .photo:nth-child(8n + 5) {
    grid-column: span 5;
    min-height: clamp(320px, 42vw, 560px);
  }

  .photo:nth-child(8n + 3),
  .photo:nth-child(8n + 4),
  .photo:nth-child(8n + 7),
  .photo:nth-child(8n + 8) {
    min-height: clamp(260px, 32vw, 430px);
  }

  .gallery[data-count="1"] .photo {
    grid-column: 2 / span 10;
    min-height: min(68vh, 740px);
  }

  .gallery[data-count="1"] .photo img {
    object-fit: contain;
    background: #090a08;
  }

  .photo::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(5, 6, 4, 0.28), transparent 24%, transparent 72%, rgba(5, 6, 4, 0.48)),
      linear-gradient(90deg, rgba(183, 255, 91, 0.11), transparent 22%);
    opacity: 0;
    transition: opacity 320ms ease;
  }

  .photo:hover {
    border-color: var(--line-strong);
  }

  .photo:hover::before {
    opacity: 1;
  }

  .photo img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    filter: saturate(0.88) contrast(1.06);
    transform: scale(1.006);
    transition: filter 420ms ease, transform 640ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  .photo:hover img {
    filter: saturate(1) contrast(1.04);
    transform: scale(1.026);
  }

  .frame-index {
    position: absolute;
    left: 14px;
    bottom: 13px;
    z-index: 3;
    color: rgba(235, 232, 223, 0.78);
    text-shadow: 0 1px 18px rgba(0, 0, 0, 0.7);
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background:
      linear-gradient(135deg, rgba(183, 255, 91, 0.08), transparent 38%),
      #0c0d0b;
    transition: opacity 360ms ease, visibility 360ms ease;
  }

  .placeholder::after {
    content: "";
    width: 44px;
    height: 1px;
    background: var(--signal);
    box-shadow: 0 0 20px rgba(183, 255, 91, 0.55);
  }

  .photo img.is-loaded + .placeholder {
    opacity: 0;
    visibility: hidden;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: grid;
    place-items: center;
    padding: var(--side);
    background: rgba(5, 6, 4, 0.94);
    backdrop-filter: blur(22px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 240ms ease, visibility 240ms ease;
    cursor: zoom-out;
  }

  .lightbox.is-open {
    opacity: 1;
    visibility: visible;
  }

  .lightbox img {
    max-width: 100%;
    max-height: calc(100vh - var(--side) * 2);
    object-fit: contain;
    border: 1px solid var(--line-strong);
    box-shadow: 0 26px 120px rgba(0, 0, 0, 0.54);
    transform: scale(0.985);
    opacity: 0;
    transition: opacity 260ms ease, transform 320ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  .lightbox.is-open img {
    opacity: 1;
    transform: scale(1);
  }

  .lightbox-meta {
    position: absolute;
    left: var(--side);
    bottom: 26px;
    color: var(--muted);
  }

  .admin-panel {
    position: fixed;
    right: var(--side);
    bottom: 24px;
    z-index: 60;
    width: min(420px, calc(100vw - var(--side) * 2));
    padding: 14px;
    border: 1px solid var(--line-strong);
    background: rgba(8, 10, 7, 0.9);
    box-shadow: 0 24px 90px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(20px);
  }

  .admin-panel,
  .admin-panel input,
  .admin-panel button {
    font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
  }

  .admin-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
    color: var(--signal);
    text-transform: uppercase;
  }

  .admin-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .admin-panel input[type="password"],
  .admin-panel input[type="text"],
  .admin-panel input[type="file"] {
    width: 100%;
    min-height: 36px;
    border: 1px solid var(--line);
    border-radius: 0;
    background: rgba(255, 255, 255, 0.035);
    color: var(--ink);
    padding: 9px 10px;
  }

  .admin-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .admin-panel button,
  .admin-delete {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 0;
    background: rgba(183, 255, 91, 0.06);
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;
  }

  .admin-panel button:hover,
  .admin-panel button.is-active,
  .admin-delete:hover {
    border-color: var(--signal);
    color: var(--signal);
  }

  .admin-panel button:disabled {
    cursor: wait;
    opacity: 0.48;
  }

  .admin-status {
    min-height: 18px;
    color: var(--muted);
    overflow-wrap: anywhere;
    text-transform: uppercase;
  }

  .admin-delete {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 4;
    display: none;
    padding: 0 10px;
    background: rgba(5, 6, 4, 0.76);
  }

  body.admin-mode .admin-delete {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  body.admin-mode .photo {
    cursor: default;
  }

  .close {
    position: absolute;
    top: 24px;
    right: var(--side);
    width: 38px;
    height: 38px;
    border: 1px solid var(--line);
    border-radius: 0;
    background: rgba(5, 6, 4, 0.66);
    color: var(--ink);
    font: 400 1.25rem/1 "IBM Plex Mono", ui-monospace, monospace;
    cursor: pointer;
  }

  .close:hover {
    border-color: var(--signal);
    color: var(--signal);
  }

  @media (max-width: 820px) {
    .shell {
      padding-top: 18px;
    }

    .topbar,
    .deck {
      grid-template-columns: 1fr;
    }

    .repo {
      justify-self: start;
    }

    h1 {
      max-width: 8ch;
    }

    .gallery[data-count="1"] .photo,
    .photo,
    .photo:nth-child(n) {
      grid-column: 1 / -1;
      min-height: min(74vh, 620px);
    }
  }

  @media (max-width: 520px) {
    .shell {
      padding-inline: 14px;
    }

    .topbar {
      padding-top: 10px;
    }

    h1 {
      font-size: clamp(3rem, 20vw, 5.5rem);
    }

    .deck p {
      font-size: 0.96rem;
    }

    .photo,
    .photo:nth-child(n) {
      min-height: 62vh;
    }

    .lightbox {
      padding: 14px;
    }

    .lightbox-meta {
      left: 14px;
      bottom: 14px;
    }

    .close {
      top: 14px;
      right: 14px;
    }

    .admin-panel {
      right: 14px;
      bottom: 14px;
      width: calc(100vw - 28px);
    }

    .admin-actions {
      grid-template-columns: 1fr;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="identity">
        <div class="kicker">github backed photo log</div>
        <h1>ToxicTox</h1>
      </div>
      <a class="repo" href="https://github.com/ywfsw/photos" target="_blank" rel="noreferrer">ywfsw/photos</a>
    </header>

    <section class="deck" aria-label="Archive summary">
      <div class="count" id="count">SCANNING</div>
    </section>

    <main>
      <div class="loading" id="loading">INDEXING REMOTE FRAMES</div>
      <div class="gallery" id="gallery" hidden></div>
      <div class="empty" id="empty" hidden>NO IMAGE FILES FOUND</div>
    </main>
  </div>

  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-label="Image preview">
    <button class="close" id="close" type="button" aria-label="Close preview">x</button>
    <img id="preview" alt="">
    <div class="lightbox-meta" id="meta"></div>
  </div>

  <aside class="admin-panel" id="adminPanel" hidden aria-label="Photo admin">
    <div class="admin-head">
      <span>repository control</span>
      <button id="adminClose" type="button">hide</button>
    </div>
    <div class="admin-grid">
      <input id="adminToken" type="password" autocomplete="off" spellcheck="false" placeholder="GitHub token: Contents read/write">
      <input id="adminPath" type="text" autocomplete="off" spellcheck="false" placeholder="upload directory, optional">
      <input id="adminFiles" type="file" accept="image/*" multiple>
      <div class="admin-actions">
        <button id="adminUpload" type="button">upload</button>
        <button id="adminDeleteMode" type="button">delete mode</button>
        <button id="adminClear" type="button">clear token</button>
      </div>
      <div class="admin-status" id="adminStatus">offline</div>
    </div>
  </aside>

<script>
const REPO = {
  owner: "ywfsw",
  name: "photos",
  branch: "main"
};

const IMAGE_EXTENSIONS = new Set([".jpg", ".jpeg", ".png", ".webp", ".gif", ".avif"]);

const FALLBACK_PHOTOS = [
  {
    path: "DSCF3536.jpeg",
    src: "https://cdn.jsdelivr.net/gh/ywfsw/photos@main/DSCF3536.jpeg",
    fallbackSrc: "https://raw.githubusercontent.com/ywfsw/photos/main/DSCF3536.jpeg"
  }
];

const gallery = document.getElementById("gallery");
const loading = document.getElementById("loading");
const empty = document.getElementById("empty");
const count = document.getElementById("count");
const lightbox = document.getElementById("lightbox");
const preview = document.getElementById("preview");
const meta = document.getElementById("meta");
const closeButton = document.getElementById("close");
const adminPanel = document.getElementById("adminPanel");
const adminClose = document.getElementById("adminClose");
const adminToken = document.getElementById("adminToken");
const adminPath = document.getElementById("adminPath");
const adminFiles = document.getElementById("adminFiles");
const adminUpload = document.getElementById("adminUpload");
const adminDeleteMode = document.getElementById("adminDeleteMode");
const adminClear = document.getElementById("adminClear");
const adminStatus = document.getElementById("adminStatus");

let deleteMode = false;

function extensionOf(path) {
  const match = path.toLowerCase().match(/\.[a-z0-9]+$/);
  return match ? match[0] : "";
}

function isImagePath(path) {
  return IMAGE_EXTENSIONS.has(extensionOf(path));
}

function frameTitle(path) {
  return path
    .split("/")
    .pop()
    .replace(/\.[^.]+$/, "")
    .replace(/[-_]+/g, " ")
    .trim();
}

function encodedPath(path) {
  return path.split("/").map(encodeURIComponent).join("/");
}

function cdnUrl(path) {
  return `https://cdn.jsdelivr.net/gh/${REPO.owner}/${REPO.name}@${REPO.branch}/${encodedPath(path)}`;
}

function rawUrl(path) {
  return `https://raw.githubusercontent.com/${REPO.owner}/${REPO.name}/${REPO.branch}/${encodedPath(path)}`;
}

function photoFromPath(path) {
  return {
    path,
    src: cdnUrl(path),
    fallbackSrc: rawUrl(path)
  };
}

function useRawFallback(image) {
  if (!image.dataset.fallbackSrc || image.src === image.dataset.fallbackSrc) return;
  image.src = image.dataset.fallbackSrc;
}

function getAdminToken() {
  return adminToken.value.trim();
}

function githubHeaders() {
  const token = getAdminToken();
  return {
    "Accept": "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28",
    ...(token ? { "Authorization": `Bearer ${token}` } : {})
  };
}

function setAdminStatus(message) {
  adminStatus.textContent = message;
}

function setAdminBusy(isBusy) {
  adminUpload.disabled = isBusy;
  adminDeleteMode.disabled = isBusy;
  adminClear.disabled = isBusy;
}

function sanitizeSegment(value) {
  return value
    .normalize("NFKD")
    .replace(/[^\w.\-/]+/g, "-")
    .replace(/\/+/g, "/")
    .replace(/^\/|\/$/g, "")
    .replace(/-{2,}/g, "-");
}

function timestamp() {
  const now = new Date();
  const parts = [
    now.getFullYear(),
    String(now.getMonth() + 1).padStart(2, "0"),
    String(now.getDate()).padStart(2, "0"),
    "-",
    String(now.getHours()).padStart(2, "0"),
    String(now.getMinutes()).padStart(2, "0"),
    String(now.getSeconds()).padStart(2, "0")
  ];
  return parts.join("");
}

function uploadPathFor(file, index) {
  const cleanName = sanitizeSegment(file.name) || `photo-${index + 1}`;
  const prefix = sanitizeSegment(adminPath.value);
  const suffix = index ? `-${index + 1}` : "";
  const filename = `${timestamp()}${suffix}-${cleanName}`;
  return prefix ? `${prefix}/${filename}` : filename;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.addEventListener("load", () => {
      const result = String(reader.result || "");
      resolve(result.includes(",") ? result.split(",").pop() : result);
    });
    reader.addEventListener("error", () => reject(reader.error));
    reader.readAsDataURL(file);
  });
}

async function githubRequest(path, options = {}) {
  const response = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/${encodedPath(path)}`, {
    ...options,
    headers: {
      ...githubHeaders(),
      ...(options.headers || {})
    }
  });

  const text = await response.text();
  const data = text ? JSON.parse(text) : null;

  if (!response.ok) {
    throw new Error(data?.message || `GitHub responded with ${response.status}`);
  }

  return data;
}

async function fetchGitHubPhotos() {
  const endpoint = `https://api.github.com/repos/${REPO.owner}/${REPO.name}/git/trees/${REPO.branch}?recursive=1`;
  const response = await fetch(endpoint, {
    headers: githubHeaders()
  });

  if (!response.ok) {
    throw new Error(`GitHub responded with ${response.status}`);
  }

  const data = await response.json();
  return data.tree
    .filter((entry) => entry.type === "blob" && isImagePath(entry.path))
    .map((entry) => photoFromPath(entry.path));
}

function flattenPackageFiles(files, prefix = "") {
  return files.flatMap((file) => {
    const path = prefix ? `${prefix}/${file.name}` : file.name;

    if (file.type === "directory" && Array.isArray(file.files)) {
      return flattenPackageFiles(file.files, path);
    }

    return file.type === "file" && isImagePath(path) ? [path] : [];
  });
}

async function fetchJsDelivrIndexPhotos() {
  const endpoint = `https://data.jsdelivr.com/v1/package/gh/${REPO.owner}/${REPO.name}@${REPO.branch}`;
  const response = await fetch(endpoint);

  if (!response.ok) {
    throw new Error(`jsDelivr responded with ${response.status}`);
  }

  const data = await response.json();
  return flattenPackageFiles(data.files || []).map(photoFromPath);
}

async function loadPhotos() {
  const sources = [fetchGitHubPhotos, fetchJsDelivrIndexPhotos];

  for (const source of sources) {
    try {
      const photos = await source();
      if (photos.length) {
        return photos.sort((a, b) => a.path.localeCompare(b.path, undefined, { numeric: true }));
      }
    } catch (_) {
      // Try the next index source. The visual fallback below keeps the page useful offline or under API limits.
    }
  }

  return FALLBACK_PHOTOS;
}

async function refreshPhotos() {
  loading.hidden = false;
  empty.hidden = true;
  gallery.hidden = true;
  const photos = await loadPhotos();
  render(photos);
}

function render(photos) {
  loading.hidden = true;
  count.textContent = `${String(photos.length).padStart(2, "0")} FRAME${photos.length === 1 ? "" : "S"}`;

  if (!photos.length) {
    empty.hidden = false;
    return;
  }

  gallery.dataset.count = String(photos.length);
  gallery.hidden = false;

  const fragment = document.createDocumentFragment();

  photos.forEach((photo, index) => {
    const number = String(index + 1).padStart(2, "0");
    const title = frameTitle(photo.path) || `Frame ${number}`;
    const item = document.createElement("button");
    item.className = "photo";
    item.type = "button";
    item.dataset.src = photo.src;
    item.dataset.fallbackSrc = photo.fallbackSrc || rawUrl(photo.path);
    item.dataset.path = photo.path;
    item.dataset.title = title;
    item.dataset.number = number;
    item.setAttribute("aria-label", `Open ${title}`);

    const img = document.createElement("img");
    img.loading = index < 2 ? "eager" : "lazy";
    img.decoding = "async";
    img.alt = title;
    img.dataset.fallbackSrc = item.dataset.fallbackSrc;
    img.src = photo.src;
    img.addEventListener("load", () => img.classList.add("is-loaded"));
    img.addEventListener("error", () => useRawFallback(img), { once: true });
    if (img.complete && img.naturalWidth > 0) img.classList.add("is-loaded");

    const marker = document.createElement("div");
    marker.className = "frame-index";
    marker.textContent = `FRAME ${number}`;

    const placeholder = document.createElement("div");
    placeholder.className = "placeholder";

    const deleteButton = document.createElement("button");
    deleteButton.className = "admin-delete";
    deleteButton.type = "button";
    deleteButton.textContent = "delete";
    deleteButton.setAttribute("aria-label", `Delete ${title}`);

    item.append(img, placeholder, marker, deleteButton);
    fragment.appendChild(item);
  });

  gallery.replaceChildren(fragment);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add("is-visible");
      observer.unobserve(entry.target);
    });
  }, { rootMargin: "0px 0px -8% 0px", threshold: 0.08 });

  gallery.querySelectorAll(".photo").forEach((item) => observer.observe(item));
}

function openPreview(item) {
  preview.src = item.dataset.src;
  preview.dataset.fallbackSrc = item.dataset.fallbackSrc;
  preview.alt = item.dataset.title;
  meta.textContent = `FRAME ${item.dataset.number} / ${item.dataset.title}`;
  lightbox.classList.add("is-open");
  document.body.style.overflow = "hidden";
}

function showAdmin() {
  adminPanel.hidden = false;
  adminToken.value = sessionStorage.getItem("toxictox.githubToken") || "";
  setAdminStatus(getAdminToken() ? "token ready" : "token required");
}

function hideAdmin() {
  adminPanel.hidden = true;
  toggleDeleteMode(false);
}

function toggleDeleteMode(force) {
  deleteMode = typeof force === "boolean" ? force : !deleteMode;
  document.body.classList.toggle("admin-mode", deleteMode);
  adminDeleteMode.classList.toggle("is-active", deleteMode);
  setAdminStatus(deleteMode ? "delete mode armed" : "delete mode off");
}

async function uploadSelectedPhotos() {
  const token = getAdminToken();
  const files = Array.from(adminFiles.files || []);

  if (!token) {
    setAdminStatus("token required");
    adminToken.focus();
    return;
  }

  if (!files.length) {
    setAdminStatus("select image files");
    adminFiles.focus();
    return;
  }

  setAdminBusy(true);

  try {
    for (const [index, file] of files.entries()) {
      if (!file.type.startsWith("image/")) {
        throw new Error(`${file.name} is not an image`);
      }

      const path = uploadPathFor(file, index);
      setAdminStatus(`uploading ${index + 1}/${files.length}`);
      const content = await fileToBase64(file);
      await githubRequest(path, {
        method: "PUT",
        body: JSON.stringify({
          message: `Add photo ${path}`,
          content,
          branch: REPO.branch
        })
      });
    }

    adminFiles.value = "";
    setAdminStatus("upload complete");
    await refreshPhotos();
  } catch (error) {
    setAdminStatus(error.message);
  } finally {
    setAdminBusy(false);
  }
}

async function deletePhoto(path, title) {
  const token = getAdminToken();

  if (!token) {
    setAdminStatus("token required");
    adminToken.focus();
    return;
  }

  if (!window.confirm(`Delete ${title}?`)) return;

  setAdminBusy(true);

  try {
    setAdminStatus("reading file sha");
    const file = await githubRequest(path, { method: "GET" });

    setAdminStatus("deleting frame");
    await githubRequest(path, {
      method: "DELETE",
      body: JSON.stringify({
        message: `Delete photo ${path}`,
        sha: file.sha,
        branch: REPO.branch
      })
    });

    setAdminStatus("delete complete");
    await refreshPhotos();
  } catch (error) {
    setAdminStatus(error.message);
  } finally {
    setAdminBusy(false);
  }
}

function closePreview() {
  lightbox.classList.remove("is-open");
  document.body.style.overflow = "";
  window.setTimeout(() => {
    if (!lightbox.classList.contains("is-open")) preview.removeAttribute("src");
  }, 260);
}

gallery.addEventListener("click", (event) => {
  const deleteButton = event.target.closest(".admin-delete");
  if (deleteButton) {
    const item = deleteButton.closest(".photo");
    if (item) deletePhoto(item.dataset.path, item.dataset.title);
    return;
  }

  const item = event.target.closest(".photo");
  if (item && !deleteMode) openPreview(item);
});

lightbox.addEventListener("click", (event) => {
  if (event.target === lightbox) closePreview();
});

closeButton.addEventListener("click", closePreview);
preview.addEventListener("error", () => useRawFallback(preview));
adminClose.addEventListener("click", hideAdmin);
adminUpload.addEventListener("click", uploadSelectedPhotos);
adminDeleteMode.addEventListener("click", () => toggleDeleteMode());
adminClear.addEventListener("click", () => {
  adminToken.value = "";
  sessionStorage.removeItem("toxictox.githubToken");
  setAdminStatus("token cleared");
});
adminToken.addEventListener("input", () => {
  const token = getAdminToken();
  if (token) {
    sessionStorage.setItem("toxictox.githubToken", token);
    setAdminStatus("token ready");
  } else {
    sessionStorage.removeItem("toxictox.githubToken");
    setAdminStatus("token required");
  }
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
    closePreview();
    return;
  }

  if ((event.metaKey || event.ctrlKey) && event.shiftKey && event.key.toLowerCase() === "m") {
    event.preventDefault();
    adminPanel.hidden ? showAdmin() : hideAdmin();
  }
});

window.addEventListener("hashchange", () => {
  if (window.location.hash === "#manage") {
    showAdmin();
  }
});

if (window.location.hash === "#manage") {
  showAdmin();
}

loadPhotos().then(render);
</script>
